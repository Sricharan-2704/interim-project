<div class="container">
  <div class="page-header">
    <h1>Notifications</h1>
    <button mat-button color="primary" (click)="markAllAsRead()" *ngIf="notifications.length > 0">
      <mat-icon>done_all</mat-icon>
      Mark All as Read
    </button>
  </div>

  <div *ngIf="isLoading" class="loading">
    <mat-spinner></mat-spinner>
  </div>

  <ng-container *ngIf="!isLoading">
    <mat-list *ngIf="notifications.length > 0">
      <mat-list-item *ngFor="let notification of notifications"
                     [class.unread]="!notification.isRead"
                     (click)="markAsRead(notification)">
        <mat-icon matListItemIcon [color]="notification.isRead ? '' : 'primary'">
          {{ notification.isRead ? 'notifications_none' : 'notifications_active' }}
        </mat-icon>
        <div matListItemTitle>{{ notification.title }}</div>
        <div matListItemLine>{{ notification.message }}</div>
        <div matListItemMeta>{{ notification.createdAt | date:'short' }}</div>
      </mat-list-item>
    </mat-list>

    <div *ngIf="notifications.length === 0" class="empty-state">
      <mat-icon>notifications_off</mat-icon>
      <h3>No notifications</h3>
      <p>You're all caught up!</p>
    </div>
  </ng-container>
</div>
