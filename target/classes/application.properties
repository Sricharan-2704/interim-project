spring.application.name=sponsorship-app-backend

# Server Configuration
server.port=7070

# ============================================
# MySQL Database Configuration
# ============================================
spring.datasource.url=jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/sponsorshipdb?sslMode=VERIFY_IDENTITY&serverSslCert=${TIDB_CA_PATH}
spring.datasource.username=8yNMALGTcnLw9fd.root
# Set the password in an environment variable for safety
spring.datasource.password=${TIDB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari tuning
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Notes:
# - Set environment variables before running the app:
#   PowerShell:
#     $env:TIDB_PASSWORD = '<your-password>'
#     $env:TIDB_CA_PATH = 'C:\path\to\ca.pem'
#     .\mvnw.cmd spring-boot:run
#   Or pass as JVM args:
#     .\mvnw.cmd spring-boot:run -Dspring-boot.run.jvmArguments="-DTIDB_PASSWORD=<pw> -DTIDB_CA_PATH=C:\path\\to\\ca.pem"
# - `serverSslCert` points to the TiDB Cloud CA certificate (PEM). Using `sslMode=VERIFY_IDENTITY` enforces hostname verification.

# JPA/Hibernate Configuration for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# H2 Console (Disabled for MySQL)
# ============================================
spring.h2.console.enabled=false

# JWT Configuration
app.jwt.secret=mySecretKey123456789012345678901234567890123456789012345678901234
server.port=${PORT:7070}

# CORS Configuration
app.cors.allowed-origins=http://localhost:4200,https://gregarious-naiad-7592c9.netlify.app

app.cors.allowed-origins=http://localhost:4200,https://sponsorship-frontend-beta.vercel.app
logging.level.root=INFO
logging.level.com.myapp.sponsorshipapp=DEBUG
# Notes:

# - Set environment variables before running the app (in Render set these in Service > Environment):
#   - TIDB_PASSWORD : the TiDB user password
#   - TIDB_CA_PATH  : path to the TiDB Cloud CA PEM inside the runtime (or upload as a file and reference its path)
#   Render provides `PORT` automatically; the app now respects `PORT` for deployments.
# - Example local PowerShell (for local testing):
#     $env:TIDB_PASSWORD = '<your-password>'
#     $env:TIDB_CA_PATH = 'C:\path\to\ca.pem'
#     .\mvnw.cmd spring-boot:run
#   Or pass as JVM args:
#     .\mvnw.cmd spring-boot:run -Dspring-boot.run.jvmArguments="-DTIDB_PASSWORD=<pw> -DTIDB_CA_PATH=C:\path\\to\\ca.pem"
# - `serverSslCert` points to the TiDB Cloud CA certificate (PEM). Using `sslMode=VERIFY_IDENTITY` enforces hostname verification.

# Deployment notes for frontend (Vercel):
# - Configure the frontend to call the backend at https://sponsorship-app.onrender.com (set the frontend's env var for API base URL in Vercel project settings).
# - Ensure the backend hostname is allowed in CORS (the Vercel origin was added above).

# Management / Actuator
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
# Actuator access token (set as environment variable `ACTUATOR_TOKEN` in Render)
app.actuator.token=${ACTUATOR_TOKEN:}
